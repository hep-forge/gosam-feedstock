{% set versions = {
    "3.0.3": "REPLACE_WITH_SHA256"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'gosam')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/gudrunhe/gosam/archive/refs/tags/v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('gfortran') }}
    - {{ stdlib('c') }}
    - make
  host:
    # TODO: GoSam needs FORM, QGraf, and Python (with a golem95/samurai/ninja
    # reduction backend) -- FORM/QGraf availability on conda-forge needs
    # checking before this can build; golem95/samurai are blocked upstream
    # (see eic-stack-roadmap memory), so ninja-hep-ph is the likely reduction
    # backend to wire in here.
  run:

test:
  commands:
    - echo "TODO: a real smoke test"

about:
  home: "https://github.com/gudrunhe/gosam"
  license: "GPL-3.0-or-later"
  summary: "GoSam: automated one-loop matrix element generation for BSM/SM amplitudes"

extra:
  recipe-maintainers:
    - meiyasan
